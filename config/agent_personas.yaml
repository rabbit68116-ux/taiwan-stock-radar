        "decision framing",
        "capital allocation language"
      ],
      "primary_indicators": [
        "market_regime",
        "signal_engine_balance",
        "style_fit",
        "thesis_coherence"
      ]
    },
    {
      "id": "technical_strategist",
      "display_name": "Technical Strategist",
      "personality": "pattern-driven, strict on structure, timing-sensitive",
      "weight": 0.16,
      "focus_areas": [
        "trend structure",
        "moving-average alignment",
        "momentum rotation",
        "breakout and pullback quality"
      ],
      "primary_indicators": [
        "ma5",
        "ma10",
