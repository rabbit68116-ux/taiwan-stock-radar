      "focus_areas": [
        "earnings timing",
        "monthly revenue release",
        "material announcements",
        "policy and industry windows"
      ],
      "primary_indicators": [
        "earnings_date",
        "revenue_release_window",
        "ex_dividend_date",
        "material_announcement_flag",
        "industry_theme",
        "adr_spillover_risk"
