      "primary_indicators": [
        "turnover_liquidity",
        "volatility_regime",
        "event_density",
        "slippage_risk",
        "invalidation_clarity"
      ]
    },
    {
      "id": "strategy_architect",
      "display_name": "Strategy Architect",
      "personality": "framework-first, selective, regime-aware",
      "weight": 0.09,
      "focus_areas": [
        "strategy-family selection",
        "style-profile selection",
        "setup classification",
        "strategy conflict resolution"
      ],
      "primary_indicators": [
        "strategy_fit_score",
        "style_fit_score",
        "regime_alignment",
        "breakout_validity",
        "pullback_depth",
        "volume_quality"
      ]
    },
    {
      "id": "quant_validation_analyst",
      "display_name": "Quant Validation Analyst",
      "personality": "methodical, skeptical, overfitting-aware",
      "weight": 0.08,
      "focus_areas": [
        "risk-adjusted performance",
        "tail-risk review",
        "parameter stability",
        "robustness testing"
      ],
      "primary_indicators": [
        "sharpe_ratio",
        "sortino_ratio",
        "calmar_ratio",
        "cvar_95",
        "deflated_sharpe_ratio",
        "walk_forward_stability"
      ]
    }
  ],
  "decision_rules": {
    "weights_must_sum_to": 1.0,
    "consensus_method": "weighted_synthesis_with_visible_dissent",
    "minimum_required_agents": 6,
    "always_include": [
      "chief_strategist",
      "risk_manager",
      "strategy_architect",
      "quant_validation_analyst"
    ],
    "final_output_order": [
      "stock_context",
      "market_regime",
      "signal_engine_summary",
      "style_profile",
      "specialist_briefs",
      "strategy_selection",
      "validation_scorecard",
      "agreement_and_disagreement",
      "final_thesis",
      "scenario_tree",
      "action_plan",
      "risk_flags",
      "invalidation"
    ]
  }
}
